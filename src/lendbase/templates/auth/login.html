{% extends "base.html" %}

{% block title %}lendbase | Log In{% endblock %}

{% block content %}
  <section class="auth-card">
    <p class="eyebrow">Shared admin access</p>
    <h2>Log in</h2>
    <p class="lead compact">
      Use the shared admin credentials for this internal inventory prototype.
    </p>

    <form class="auth-form" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" method="post">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" value="{{ entered_username or '' }}" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button class="button" type="submit">Log in</button>
    </form>
  </section>
{% endblock %}
